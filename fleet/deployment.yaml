apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-website
spec:
  # Reduce to 1 replica to ensure it can run on limited hardware
  replicas: 1
  # Extend the progress deadline to give more time for pod startup on Pi hardware
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: my-website
  strategy:
    type: Recreate  # Avoid having multiple versions during rollout on limited hardware
  template:
    metadata:
      labels:
        app: my-website
    spec:
      # Tolerations for potential taints on the Pi nodes
      tolerations:
      - effect: NoSchedule
        operator: Exists
      # Try harder to fit this workload on the platform
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - arm
                - arm64
      containers:
        - name: my-website
          # Pinned by digest for reproducible, rollback-able deploys (corresponds to
          # the image previously deployed as :latest). Update via CI when publishing.
          image: "hoffeloffe/my-website@sha256:20532f44155e6b626fb14ffa9f9d077ec3db04371e183cf0f2e3c151ecff3edf"
          ports:
            - name: http
              containerPort: 3000
          # Increased resources for Raspberry Pi
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
          imagePullPolicy: IfNotPresent
          # Environment variables
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"  # Explicitly set the port in case app looks for this env var
